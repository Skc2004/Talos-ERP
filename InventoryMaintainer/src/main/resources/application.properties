server.port=8080

spring.datasource.url=jdbc:postgresql://db.nkctzzerpcughgwhpduf.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=HelloSKC808@@
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=3

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka mock configuration assuming local Kafka if it were running
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=mantra-group

# InsightMantra AI Service
insight.mantra.url=http://localhost:8000

# ─── Resilience4j Circuit Breaker ───
resilience4j.circuitbreaker.instances.insightMantra.sliding-window-size=10
resilience4j.circuitbreaker.instances.insightMantra.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.insightMantra.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.insightMantra.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.insightMantra.minimum-number-of-calls=5

# ─── Actuator Health & Metrics ───
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ─── CORS ───
cors.allowed.origins=http://localhost:5173

# ─── Inventory Thresholds ───
inventory.zscore=1.645
inventory.health.optimal=14
inventory.health.healthy=7
inventory.health.warning=3

