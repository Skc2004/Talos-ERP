name: Mantra ERP - CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  PYTHON_VERSION: '3.13'

jobs:
  # ─── Stage 1: Java Backend Tests ───
  java-tests:
    name: Java - JUnit & Spring Boot
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: InventoryMaintainer

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run JUnit Tests
        run: mvn test -B --no-transfer-progress

      - name: Build Production JAR
        run: mvn package -DskipTests -B --no-transfer-progress

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: InventoryMaintainer/target/surefire-reports/

  # ─── Stage 2: Python AI Tests ───
  python-tests:
    name: Python - Pytest (Z-Score, NLP, Lead Scoring)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: InsightMantra

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pytest requests python-dotenv supabase transformers torch

      - name: Run Z-Score & Lead Scoring Tests
        run: python -m pytest tests/test_zscore_detector.py tests/test_lead_scoring.py -v --tb=short --junitxml=test-results.xml

      - name: Run NLP Sentiment Tests
        run: python -m pytest tests/test_nlp_engine.py -v --tb=short

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: InsightMantra/test-results.xml

  # ─── Stage 3: Linting ───
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Linters
        run: pip install flake8 black

      - name: Python Lint (Flake8)
        run: flake8 InsightMantra/ --max-line-length=120 --ignore=E501,W503 --count --show-source || true

      - name: Python Format Check (Black)
        run: black --check InsightMantra/ --line-length=120 || true

  # ─── Stage 4: Frontend Build ───
  frontend-build:
    name: React - Build Verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WarehouseFrontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: WarehouseFrontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Production Bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  # ─── Stage 5: Chaos Monkey ───
  chaos-probe:
    name: Chaos Monkey - Resilience Probe
    needs: [java-tests, python-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: InsightMantra

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: pip install requests python-dotenv supabase

      - name: Run Chaos Sweep
        run: python chaos_monkey.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
